<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LB Push Tester</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#12161a] text-[#e2e8f0] font-sans antialiased flex items-center justify-center min-h-screen p-4 select-none">

  <div id="root" class="w-full max-w-md"></div>

  <script type="text/babel">
    const TOPIC = 'lb1747';

    function App() {
      const [status, setStatus] = React.useState('Initialisation...');
      const [isSubscribed, setIsSubscribed] = React.useState(false);
      const [loading, setLoading] = React.useState(false);
      const [logs, setLogs] = React.useState([]);

      // Ajoute une ligne de log avec timestamp
      const addLog = (message, isError = false) => {
        const timestamp = new Date().toLocaleTimeString();
        setLogs(prev => [...prev, { time: timestamp, msg: message, error: isError }]);
      };

      // Vide les logs (pour repartir de zéro)
      const clearLogs = () => setLogs([]);

      // Copie les logs formatés dans le presse-papiers
      const copyLogs = () => {
        const text = logs.map(l => `[${l.time}] ${l.msg}`).join('\n');
        navigator.clipboard.writeText(text).then(
          () => alert('Rapport copié !'),
          () => alert('Impossible de copier, veuillez copier manuellement.')
        );
      };

      React.useEffect(() => {
        addLog('Application démarrée');
        checkSubscription();
      }, []);

      async function checkSubscription() {
        addLog('Vérification du support Web Push...');
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
          const msg = 'Web Push non supporté par ce navigateur.';
          addLog(msg, true);
          setStatus(msg);
          return;
        }

        try {
          addLog('Enregistrement du Service Worker...');
          const reg = await navigator.serviceWorker.register('./sw.js');
          await navigator.serviceWorker.ready;
          addLog('Service Worker prêt');

          addLog('Récupération de l’abonnement existant...');
          const sub = await reg.pushManager.getSubscription();
          const subscribed = !!sub;
          setIsSubscribed(subscribed);
          setStatus(subscribed ? 'Abonné au flux.' : 'Prêt à l\'activation.');
          addLog(subscribed ? 'Abonnement actif' : 'Aucun abonnement');
        } catch (err) {
          const msg = 'Erreur checkSubscription : ' + err.message;
          addLog(msg, true);
          setStatus(msg);
        }
      }

      async function handleSubscribe() {
        setLoading(true);
        addLog('=== DÉBUT ABONNEMENT ===');
        setStatus('Demande de permission...');

        try {
          addLog('Demande de permission Notification...');
          const permission = await Notification.requestPermission();
          if (permission !== 'granted') {
            throw new Error('Permission refusée par l’utilisateur');
          }
          addLog('Permission accordée');

          const reg = await navigator.serviceWorker.ready;
          addLog('Service Worker ready');

          setStatus('Récupération de la clé VAPID ntfy...');
          addLog('Requête vers https://ntfy.sh/v1/config');
          const configRes = await fetch('https://ntfy.sh/v1/config');
          if (!configRes.ok) throw new Error(`HTTP ${configRes.status} lors de la récupération de la config`);
          const config = await configRes.json();
          addLog('Config reçue');

          // Correction : ntfy utilise "web_push_public_key" (snake_case)
          const publicKey = config.web_push_public_key || config.webPushPublicKey;
          if (!publicKey) {
            throw new Error('Clé VAPID introuvable dans la réponse du serveur');
          }
          addLog('Clé VAPID récupérée (longueur: ' + publicKey.length + ')');

          // Décodage base64 vers Uint8Array
          const padding = '='.repeat((4 - publicKey.length % 4) % 4);
          const base64 = (publicKey + padding).replace(/\-/g, '+').replace(/_/g, '/');
          const rawData = window.atob(base64);
          const outputArray = new Uint8Array(rawData.length);
          for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
          addLog('Clé convertie en Uint8Array');

          setStatus('Génération du token natif...');
          addLog('Appel à pushManager.subscribe...');
          const subscription = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: outputArray
          });
          addLog('Abonnement créé (endpoint: ' + subscription.endpoint.substring(0, 50) + '…)');

          setStatus('Liaison avec le serveur ntfy...');
          addLog('Envoi de l’abonnement à ntfy.sh/' + TOPIC + '/webpush');
          const pushRes = await fetch(`https://ntfy.sh/${TOPIC}/webpush`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(subscription)
          });
          if (!pushRes.ok) throw new Error(`HTTP ${pushRes.status} lors de l’enregistrement sur ntfy`);
          addLog('Abonnement enregistré sur le serveur ntfy');

          setIsSubscribed(true);
          setStatus('Notification Push activée !');
          addLog('=== ABONNEMENT RÉUSSI ===');
        } catch (err) {
          const msg = 'Échec : ' + err.message;
          addLog(msg, true);
          setStatus(msg);
        }
        setLoading(false);
      }

      async function handleTriggerNotification() {
        setLoading(true);
        addLog('=== ENVOI D’UNE NOTIFICATION ===');
        try {
          addLog(`POST sur https://ntfy.sh/${TOPIC} avec titre "Test Système"`);
          const res = await fetch(`https://ntfy.sh/${TOPIC}`, {
            method: 'POST',
            headers: { 'Title': 'Test Système', 'Priority': 'high', 'Click': window.location.href },
            body: 'Le signal Web Push VAPID fonctionne en tâche de fond !'
          });
          if (!res.ok) throw new Error(`HTTP ${res.status} lors de l’envoi`);
          addLog('Message envoyé avec succès');
          setStatus('Signal envoyé !');
        } catch (err) {
          const msg = 'Erreur envoi : ' + err.message;
          addLog(msg, true);
          setStatus(msg);
        }
        setLoading(false);
      }

      return (
        <div className="bg-[#1b2126] rounded-3xl p-6 border border-[#242c33] shadow-xl">
          <div className="text-center mb-6">
            <h1 className="text-xl font-bold text-[#00f2fe]">LB PUSH PROTOCOL</h1>
            <p className="text-xs text-[#718096] mt-1">Topic : {TOPIC}</p>
          </div>

          <div className="bg-[#15191d] rounded-2xl p-4 mb-6 text-sm text-center font-mono text-[#94a3b8] border border-[#101417]">
            {status}
          </div>

          <div className="flex flex-col gap-4 mb-6">
            {!isSubscribed ? (
              <button onClick={handleSubscribe} disabled={loading} className="w-full py-4 rounded-xl font-semibold bg-gradient-to-r from-[#00c6ff] to-[#00f2fe] text-[#0f172a] transition-transform active:scale-95">
                {loading ? 'Configuration...' : 'Autoriser & S\'abonner'}
              </button>
            ) : (
              <button onClick={handleTriggerNotification} disabled={loading} className="w-full py-4 rounded-xl font-semibold bg-[#222a30] text-[#00f2fe] border border-[#2b353d] transition-transform active:scale-95">
                {loading ? 'Envoi...' : '🚀 Envoyer la Notification'}
              </button>
            )}
          </div>

          {/* Console de logs */}
          <div className="mt-4">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-semibold text-[#718096] uppercase tracking-wider">Console de débogage</span>
              <div className="flex gap-2">
                <button onClick={clearLogs} className="text-xs text-[#718096] hover:text-[#94a3b8] transition">Effacer</button>
                <button onClick={copyLogs} className="text-xs text-[#00f2fe] hover:text-[#00c6ff] transition">📋 Copier le rapport</button>
              </div>
            </div>
            <div className="bg-[#0d1114] rounded-xl border border-[#1f282f] p-3 h-40 overflow-y-auto font-mono text-xs leading-relaxed">
              {logs.length === 0 ? (
                <div className="text-[#4a5568] italic">Aucun log pour le moment.</div>
              ) : (
                logs.map((log, idx) => (
                  <div key={idx} className={log.error ? 'text-[#fc8181]' : 'text-[#a0aec0]'}>
                    <span className="text-[#4a5568]">[{log.time}]</span> {log.msg}
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

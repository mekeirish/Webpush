<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LB Push Tester</title>
  <link rel="manifest" href="manifest.json">

  <!-- OneSignal SDK (Typical Site) -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "893ad5cf-804c-4e1c-a564-b5f3afbe3c75",
        allowLocalhostAsSecureOrigin: true,
      });
    });
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#12161a] text-[#e2e8f0] font-sans antialiased flex items-center justify-center min-h-screen p-4 select-none">

<div id="root" class="w-full max-w-2xl"></div>

<script type="text/babel">
  const TOPIC = 'lb1747';
  const ONE_SIGNAL_APP_ID = '893ad5cf-804c-4e1c-a564-b5f3afbe3c75';
  const ONE_SIGNAL_REST_API_KEY = 'os_v2_app_re5nlt4ajrhbzjlewxz27pr4ov2lv3ijnpzejc5q4nappjyycboqgnhk3udsmmzmzzxodkbvdaf6grnvrgf4b7o7qhm73to6je2uwja'; // À remplacer

  function App() {
    // États ntfy
    const [status, setStatus] = React.useState('Initialisation...');
    const [isSubscribed, setIsSubscribed] = React.useState(false);
    const [loading, setLoading] = React.useState(false);
    const [logs, setLogs] = React.useState([]);

    // États OneSignal
    const [isOneSignalSubscribed, setIsOneSignalSubscribed] = React.useState(false);
    const [osLoading, setOsLoading] = React.useState(false);

    // Champs communs
    const [title, setTitle] = React.useState('Notification LB');
    const [message, setMessage] = React.useState('Bonsoir');
    const [delay, setDelay] = React.useState('5');
    const [useDelay, setUseDelay] = React.useState(false);

    const addLog = (msg, isError = false) => {
      const time = new Date().toLocaleTimeString();
      setLogs(prev => [...prev, { time, msg, error: isError }]);
    };
    const clearLogs = () => setLogs([]);
    const copyLogs = () => {
      const text = logs.map(l => `[${l.time}] ${l.msg}`).join('\n');
      navigator.clipboard.writeText(text).then(
        () => alert('Rapport copié !'),
        () => alert('Impossible de copier.')
      );
    };

    // ----- Initialisation -----
    React.useEffect(() => {
      addLog('Application démarrée');
      checkSubscription();
      checkOneSignalStatus();
    }, []);

    // ----- Vérification ntfy -----
    async function checkSubscription() {
      addLog('Vérification du support Web Push...');
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        setStatus('Web Push non supporté.');
        addLog('Non supporté', true);
        return;
      }
      try {
        addLog('Enregistrement du Service Worker ntfy...');
        const reg = await navigator.serviceWorker.register('./sw.js');
        await navigator.serviceWorker.ready;
        addLog('Service Worker ntfy prêt');
        const sub = await reg.pushManager.getSubscription();
        const subscribed = !!sub;
        setIsSubscribed(subscribed);
        setStatus(subscribed ? 'Abonné ntfy.' : 'Prêt ntfy.');
        addLog(subscribed ? 'Abonnement ntfy actif' : 'Aucun abonnement ntfy');
        if (subscribed) {
          addLog('Endpoint: ' + sub.endpoint.substring(0, 60) + '…');
        }
      } catch (err) {
        setStatus('Erreur: ' + err.message);
        addLog('Erreur checkSubscription: ' + err.message, true);
      }
    }

    // ----- Vérification OneSignal (CORRIGÉE) -----
    async function checkOneSignalStatus() {
      try {
        if (window.OneSignal) {
          // Utilisation de la propriété .optedIn (booléen)
          const isSubscribed = await window.OneSignal.User.PushSubscription.optedIn;
          setIsOneSignalSubscribed(isSubscribed);
          addLog(`OneSignal: ${isSubscribed ? 'abonné' : 'non abonné'}`);
        } else {
          addLog('OneSignal SDK non chargé', true);
        }
      } catch (err) {
        addLog('Erreur check OneSignal: ' + err.message, true);
      }
    }

    // ----- NTFY : Abonnement -----
    async function handleSubscribe() {
      setLoading(true);
      addLog('=== NTFY : ABONNEMENT ===');
      setStatus('Demande de permission...');
      try {
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') throw new Error('Permission refusée');
        addLog('Permission accordée');

        const reg = await navigator.serviceWorker.ready;
        addLog('Service Worker ready');

        setStatus('Récupération de la clé VAPID ntfy...');
        addLog('Requête vers https://ntfy.sh/v1/config');
        const configRes = await fetch('https://ntfy.sh/v1/config');
        if (!configRes.ok) throw new Error(`HTTP ${configRes.status}`);
        const config = await configRes.json();
        const publicKey = config.web_push_public_key || config.webPushPublicKey;
        if (!publicKey) throw new Error('Clé VAPID introuvable');
        addLog('Clé VAPID récupérée');

        const padding = '='.repeat((4 - publicKey.length % 4) % 4);
        const base64 = (publicKey + padding).replace(/\-/g, '+').replace(/_/g, '/');
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
        addLog('Clé convertie');

        setStatus('Génération du token natif...');
        const subscription = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: outputArray
        });
        addLog('Abonnement créé');

        setStatus('Liaison avec le serveur ntfy...');
        const pushRes = await fetch(`https://ntfy.sh/${TOPIC}/webpush`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(subscription)
        });
        if (!pushRes.ok) {
          const errText = await pushRes.text();
          throw new Error(`HTTP ${pushRes.status}: ${errText}`);
        }
        addLog('Abonnement enregistré sur ntfy');

        setIsSubscribed(true);
        setStatus('ntfy activé !');
        addLog('=== NTFY ABONNEMENT RÉUSSI ===');
      } catch (err) {
        const msg = 'Échec : ' + err.message;
        addLog(msg, true);
        setStatus(msg);
      }
      setLoading(false);
    }

    async function handleUnsubscribe() {
      setLoading(true);
      addLog('=== NTFY : DÉSABONNEMENT ===');
      try {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          await sub.unsubscribe();
          addLog('Désabonné ntfy');
          setIsSubscribed(false);
          setStatus('Désabonné ntfy');
        } else {
          addLog('Aucun abonnement ntfy');
        }
      } catch (err) {
        addLog('Erreur désabonnement: ' + err.message, true);
      }
      setLoading(false);
    }

    // ----- NTFY : Envoi -----
    async function handleTriggerNotification() {
      setLoading(true);
      addLog('=== NTFY : ENVOI ===');
      try {
        const payload = { title, message, click: window.location.href };
        const headers = { 'Content-Type': 'application/json' };
        if (useDelay && parseInt(delay, 10) > 0) {
          headers['X-Delay'] = `${parseInt(delay, 10)}s`;
          addLog(`Délai ntfy : ${delay}s`);
        } else {
          addLog('Délai ntfy désactivé');
        }

        addLog(`POST sur ntfy.sh/${TOPIC}`);
        const res = await fetch(`https://ntfy.sh/${TOPIC}`, {
          method: 'POST',
          headers: headers,
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`HTTP ${res.status} - ${errText}`);
        }
        addLog('Notification ntfy envoyée');
        setStatus('ntfy envoyé !');
      } catch (err) {
        setStatus('Erreur ntfy : ' + err.message);
        addLog('Erreur: ' + err.message, true);
      }
      setLoading(false);
    }

    // ----- ONESIGNAL : Abonnement -----
    async function handleOneSignalSubscribe() {
      setOsLoading(true);
      addLog('=== ONESIGNAL : ABONNEMENT ===');
      try {
        if (!window.OneSignal) throw new Error('SDK OneSignal non chargé');
        await window.OneSignal.User.PushSubscription.optIn();
        setIsOneSignalSubscribed(true);
        addLog('Abonné OneSignal');
        setStatus('OneSignal abonné');
      } catch (err) {
        addLog('Erreur OneSignal: ' + err.message, true);
        setStatus('Erreur OneSignal');
      }
      setOsLoading(false);
    }

    async function handleOneSignalUnsubscribe() {
      setOsLoading(true);
      addLog('=== ONESIGNAL : DÉSABONNEMENT ===');
      try {
        if (!window.OneSignal) throw new Error('SDK OneSignal non chargé');
        await window.OneSignal.User.PushSubscription.optOut();
        setIsOneSignalSubscribed(false);
        addLog('Désabonné OneSignal');
        setStatus('OneSignal désabonné');
      } catch (err) {
        addLog('Erreur désabonnement OneSignal: ' + err.message, true);
      }
      setOsLoading(false);
    }

    // ----- ONESIGNAL : Envoi via API REST -----
    async function handleOneSignalSend() {
      setOsLoading(true);
      addLog('=== ONESIGNAL : ENVOI API ===');
      try {
        const response = await fetch('https://onesignal.com/api/v1/notifications', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Basic ${ONE_SIGNAL_REST_API_KEY}`
          },
          body: JSON.stringify({
            app_id: ONE_SIGNAL_APP_ID,
            contents: { en: message || 'Bonsoir' },
            headings: { en: title || 'Notification LB' },
            included_segments: ['All'],
            url: window.location.href
          })
        });
        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`HTTP ${response.status} - ${errText}`);
        }
        const data = await response.json();
        addLog(`Notification OneSignal envoyée (id: ${data.id})`);
        setStatus('OneSignal envoyé !');
      } catch (err) {
        setStatus('Erreur OneSignal: ' + err.message);
        addLog('Erreur: ' + err.message, true);
      }
      setOsLoading(false);
    }

    // ----- TEST LOCAL (via ntfy SW) -----
    async function handleLocalTest() {
      setLoading(true);
      addLog('=== TEST LOCAL (ntfy SW) ===');
      try {
        const reg = await navigator.serviceWorker.ready;
        if (!reg.active) throw new Error('Service Worker non actif');
        reg.active.postMessage({
          type: 'TEST',
          title: title || 'Test local',
          message: message || 'Notification instantanée'
        });
        addLog('Message envoyé au Service Worker');
        setStatus('Test local envoyé');
      } catch (err) {
        addLog('Erreur test local: ' + err.message, true);
        setStatus('Erreur test local');
      }
      setLoading(false);
    }

    // ----- RENDU -----
    return (
      <div className="bg-[#1b2126] rounded-3xl p-6 border border-[#242c33] shadow-xl">
        <div className="text-center mb-6">
          <h1 className="text-xl font-bold text-[#00f2fe]">LB PUSH PROTOCOL</h1>
          <p className="text-xs text-[#718096] mt-1">Topic ntfy : {TOPIC}</p>
          <p className="text-xs text-[#718096]">OneSignal App ID : {ONE_SIGNAL_APP_ID.slice(0, 8)}…</p>
        </div>

        <div className="bg-[#15191d] rounded-2xl p-4 mb-6 text-sm text-center font-mono text-[#94a3b8] border border-[#101417]">
          {status}
        </div>

        {/* Champs communs */}
        <div className="space-y-3 mb-6">
          <div>
            <label className="text-xs text-[#718096] block mb-1">Titre</label>
            <input
              type="text"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              className="w-full bg-[#15191d] border border-[#242c33] rounded-xl px-4 py-2 text-sm text-[#e2e8f0] focus:outline-none focus:border-[#00f2fe]"
              placeholder="Titre"
            />
          </div>
          <div>
            <label className="text-xs text-[#718096] block mb-1">Message</label>
            <input
              type="text"
              value={message}
              onChange={(e) => setMessage(e.target.value)}
              className="w-full bg-[#15191d] border border-[#242c33] rounded-xl px-4 py-2 text-sm text-[#e2e8f0] focus:outline-none focus:border-[#00f2fe]"
              placeholder="Message"
            />
          </div>
          <div className="flex items-center gap-4">
            <div className="flex-1">
              <label className="text-xs text-[#718096] block mb-1">Délai ntfy (secondes)</label>
              <input
                type="number"
                value={delay}
                onChange={(e) => setDelay(e.target.value)}
                className="w-full bg-[#15191d] border border-[#242c33] rounded-xl px-4 py-2 text-sm text-[#e2e8f0] focus:outline-none focus:border-[#00f2fe]"
                placeholder="5"
                min="0"
              />
            </div>
            <div className="flex items-center mt-2">
              <input
                type="checkbox"
                checked={useDelay}
                onChange={(e) => setUseDelay(e.target.checked)}
                className="mr-2"
              />
              <label className="text-xs text-[#718096]">Activer délai</label>
            </div>
          </div>
        </div>

        {/* Bloc NTFY */}
        <div className="border border-[#2b353d] rounded-xl p-4 mb-6">
          <h2 className="text-sm font-semibold text-[#00f2fe] mb-3">📡 NTFY</h2>
          <div className="flex flex-col gap-3">
            {!isSubscribed ? (
              <button onClick={handleSubscribe} disabled={loading} className="w-full py-3 rounded-xl font-semibold bg-gradient-to-r from-[#00c6ff] to-[#00f2fe] text-[#0f172a] transition-transform active:scale-95">
                {loading ? 'Chargement...' : 'S\'abonner ntfy'}
              </button>
            ) : (
              <>
                <button onClick={handleTriggerNotification} disabled={loading} className="w-full py-3 rounded-xl font-semibold bg-[#222a30] text-[#00f2fe] border border-[#2b353d] transition-transform active:scale-95">
                  {loading ? 'Envoi...' : `🚀 Envoyer ntfy ${useDelay ? `(délai ${delay}s)` : '(instantané)'}`}
                </button>
                <button onClick={handleUnsubscribe} disabled={loading} className="w-full py-3 rounded-xl font-semibold bg-[#2a1a1a] text-[#fc8181] border border-[#4a2b2b] transition-transform active:scale-95">
                  Se désabonner ntfy
                </button>
              </>
            )}
          </div>
        </div>

        {/* Bloc ONESIGNAL */}
        <div className="border border-[#4a2b4a] rounded-xl p-4 mb-6">
          <h2 className="text-sm font-semibold text-[#d6b3ff] mb-3">📱 ONESIGNAL</h2>
          <div className="flex flex-col gap-3">
            {!isOneSignalSubscribed ? (
              <button onClick={handleOneSignalSubscribe} disabled={osLoading} className="w-full py-3 rounded-xl font-semibold bg-[#3a2a3a] text-[#d6b3ff] border border-[#4a2b4a] transition-transform active:scale-95">
                {osLoading ? 'Chargement...' : 'S\'abonner OneSignal'}
              </button>
            ) : (
              <>
                <button onClick={handleOneSignalSend} disabled={osLoading} className="w-full py-3 rounded-xl font-semibold bg-[#3a2a3a] text-[#d6b3ff] border border-[#4a2b4a] transition-transform active:scale-95">
                  {osLoading ? 'Envoi...' : '📤 Envoyer OneSignal (API)'}
                </button>
                <button onClick={handleOneSignalUnsubscribe} disabled={osLoading} className="w-full py-3 rounded-xl font-semibold bg-[#2a1a2a] text-[#fc8181] border border-[#4a2b2b] transition-transform active:scale-95">
                  Se désabonner OneSignal
                </button>
              </>
            )}
            <button onClick={checkOneSignalStatus} className="w-full py-2 rounded-xl font-semibold bg-[#15191d] text-[#718096] border border-[#242c33] text-xs">
              🔍 Vérifier statut OneSignal
            </button>
          </div>
        </div>

        {/* Test local */}
        <div className="border border-[#2b4a4d] rounded-xl p-4 mb-6">
          <h2 className="text-sm font-semibold text-[#81e6d9] mb-3">🧪 TEST LOCAL (SW)</h2>
          <button onClick={handleLocalTest} disabled={loading} className="w-full py-3 rounded-xl font-semibold bg-[#1a2a2f] text-[#81e6d9] border border-[#2b4a4d] transition-transform active:scale-95">
            {loading ? 'Test...' : 'Afficher notification instantanée'}
          </button>
        </div>

        {/* Console */}
        <div className="mt-4">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-semibold text-[#718096] uppercase tracking-wider">Console de débogage</span>
            <div className="flex gap-2">
              <button onClick={clearLogs} className="text-xs text-[#718096] hover:text-[#94a3b8] transition">Effacer</button>
              <button onClick={copyLogs} className="text-xs text-[#00f2fe] hover:text-[#00c6ff] transition">📋 Copier le rapport</button>
            </div>
          </div>
          <div className="bg-[#0d1114] rounded-xl border border-[#1f282f] p-3 h-48 overflow-y-auto font-mono text-xs leading-relaxed">
            {logs.length === 0 ? (
              <div className="text-[#4a5568] italic">Aucun log pour le moment.</div>
            ) : (
              logs.map((log, idx) => (
                <div key={idx} className={log.error ? 'text-[#fc8181]' : 'text-[#a0aec0]'}>
                  <span className="text-[#4a5568]">[{log.time}]</span> {log.msg}
                </div>
              ))
            )}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

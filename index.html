<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LB Push Tester</title>
  <link rel="manifest" href="manifest.json" />

  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function (OneSignal) {
      await OneSignal.init({
        appId: '893ad5cf-804c-4e1c-a564-b5f3afbe3c75',
        allowLocalhostAsSecureOrigin: true,
      });
    });
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#12161a] text-[#e2e8f0] font-sans antialiased flex items-center justify-center min-h-screen p-4 select-none">
  <div id="root" class="w-full max-w-md"></div>

  <script type="text/babel">
    const APP_ID = '893ad5cf-804c-4e1c-a564-b5f3afbe3c75';
    // ⚠️ Clé exposée pour le test – à déplacer en backend pour la production
    const REST_API_KEY = 'os_v2_app_re5nlt4ajrhbzjlewxz27pr4ov2lv3ijnpzejc5q4nappjyycboqgnhk3udsmmzmzzxodkbvdaf6grnvrgf4b7o7qhm73to6je2uwja';

    // Proxy CORS (utilisé pour contourner les blocages CORS en test)
    const CORS_PROXY = 'https://corsproxy.io/?';
    // Alternative gratuite : 'https://api.allorigins.win/raw?url='

    function App() {
      const [status, setStatus] = React.useState('Initialisation...');
      const [isSubscribed, setIsSubscribed] = React.useState(false);
      const [loading, setLoading] = React.useState(false);
      const [logs, setLogs] = React.useState([]);
      const [title, setTitle] = React.useState('Notification OneSignal');
      const [message, setMessage] = React.useState('Bonsoir');

      const addLog = (msg, isError = false) => {
        const time = new Date().toLocaleTimeString();
        setLogs(prev => [...prev, { time, msg, error: isError }]);
      };

      const clearLogs = () => setLogs([]);
      const copyLogs = () => {
        const text = logs.map(l => `[${l.time}] ${l.msg}`).join('\n');
        navigator.clipboard.writeText(text).then(
          () => alert('Rapport copié !'),
          () => alert('Impossible de copier.')
        );
      };

      // Enregistrement du Service Worker local
      const registerLocalSW = async () => {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js');
          addLog('Service Worker local enregistré ✓');
          return reg;
        } catch (err) {
          addLog('Erreur enregistrement SW local: ' + err.message, true);
          return null;
        }
      };

      const checkOneSignalStatus = async () => {
        try {
          if (window.OneSignal) {
            const subscribed = await window.OneSignal.User.PushSubscription.optedIn;
            setIsSubscribed(subscribed);
            setStatus(subscribed ? '✅ Abonné' : '❌ Non abonné');
            addLog(`OneSignal: ${subscribed ? 'abonné' : 'non abonné'}`);
          } else {
            addLog('OneSignal non disponible', true);
          }
        } catch (err) {
          addLog('Erreur check: ' + err.message, true);
        }
      };

      React.useEffect(() => {
        addLog('Application démarrée');
        registerLocalSW();
        if (navigator.standalone) {
          addLog('📱 PWA installée (iOS)');
        } else {
          addLog('⚠️ PWA non installée. Sur iOS, les push nécessitent l\'installation.');
        }
        setTimeout(checkOneSignalStatus, 3000);
      }, []);

      // ----- Abonnement -----
      const handleSubscribe = async () => {
        if (!window.OneSignal) {
          addLog('OneSignal non chargé', true);
          return;
        }
        setLoading(true);
        addLog('=== ABONNEMENT ===');
        try {
          await window.OneSignal.Notifications.requestPermission();
          await window.OneSignal.User.PushSubscription.optIn();
          const subscribed = window.OneSignal.User.PushSubscription.optedIn;
          setIsSubscribed(subscribed);
          if (subscribed) {
            addLog('✅ Abonné avec succès');
            setStatus('✅ Abonné');
          } else {
            addLog('❌ Permission refusée', true);
            setStatus('❌ Non autorisé');
          }
        } catch (err) {
          addLog('Erreur abonnement: ' + err.message, true);
          setStatus('❌ Erreur');
        } finally {
          setLoading(false);
        }
      };

      const handleUnsubscribe = async () => {
        if (!window.OneSignal) return;
        setLoading(true);
        addLog('=== DÉSABONNEMENT ===');
        try {
          await window.OneSignal.User.PushSubscription.optOut();
          setIsSubscribed(false);
          setStatus('❌ Désabonné');
          addLog('Désabonné');
        } catch (err) {
          addLog('Erreur: ' + err.message, true);
        } finally {
          setLoading(false);
        }
      };

      // ----- Envoi via API REST (avec proxy CORS) -----
      const handleSend = async () => {
        if (!isSubscribed) {
          addLog('Abonnez-vous d’abord', true);
          return;
        }
        setLoading(true);
        addLog('=== ENVOI API ===');

        const payload = {
          app_id: APP_ID,
          contents: { en: message || 'Bonsoir' },
          headings: { en: title || 'Notification OneSignal' },
          included_segments: ['All'],
          url: window.location.href,
        };

        const headers = {
          'Content-Type': 'application/json',
          'Authorization': 'Basic ' + REST_API_KEY,
        };

        // Tentative directe (peut échouer à cause des CORS)
        try {
          addLog('Tentative directe...');
          const response = await fetch('https://onesignal.com/api/v1/notifications', {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(payload),
          });
          if (!response.ok) {
            const errText = await response.text();
            throw new Error('HTTP ' + response.status + ' - ' + errText);
          }
          const data = await response.json();
          addLog('✅ Envoyée (id: ' + data.id + ')');
          setStatus('✅ Envoyé !');
          setLoading(false);
          return;
        } catch (directErr) {
          addLog('Directe échouée: ' + directErr.message, true);
          // Si échec, on tente via proxy
          try {
            addLog('Tentative via proxy CORS...');
            const proxyUrl = CORS_PROXY + encodeURIComponent('https://onesignal.com/api/v1/notifications');
            const response = await fetch(proxyUrl, {
              method: 'POST',
              headers: headers,
              body: JSON.stringify(payload),
            });
            if (!response.ok) {
              const errText = await response.text();
              throw new Error('Proxy HTTP ' + response.status + ' - ' + errText);
            }
            const data = await response.json();
            addLog('✅ Envoyée via proxy (id: ' + data.id + ')');
            setStatus('✅ Envoyé !');
          } catch (proxyErr) {
            let msg = proxyErr.message;
            if (msg === 'Failed to fetch') {
              msg = 'Le proxy CORS est indisponible. Veuillez essayer plus tard ou utiliser un autre proxy.';
            }
            setStatus('❌ Erreur envoi');
            addLog('Erreur: ' + msg, true);
          }
        } finally {
          setLoading(false);
        }
      };

      // ----- Test local (SW) -----
      const handleLocalTest = async () => {
        setLoading(true);
        addLog('=== TEST LOCAL ===');
        try {
          let reg = await navigator.serviceWorker.getRegistration('./sw.js');
          if (!reg || !reg.active) {
            const newReg = await navigator.serviceWorker.register('./sw.js');
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (!newReg.active) throw new Error('SW local non actif');
            reg = newReg;
          }
          reg.active.postMessage({
            type: 'TEST',
            title: title || 'Test local',
            message: message || 'Notification instantanée',
          });
          addLog('Message envoyé au SW local');
          setStatus('🧪 Test local envoyé');
        } catch (err) {
          addLog('Erreur test local: ' + err.message, true);
          setStatus('❌ Erreur test local');
          try {
            if (Notification.permission === 'granted') {
              new Notification(title || 'Test local', { body: message || 'Notification directe' });
              addLog('✅ Notification directe (fallback)');
            } else {
              addLog('Permission non accordée pour fallback', true);
            }
          } catch (e) {
            addLog('Fallback échoué: ' + e.message, true);
          }
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="bg-[#1b2126] rounded-3xl p-6 border border-[#242c33] shadow-xl">
          <div className="text-center mb-6">
            <h1 className="text-xl font-bold text-[#00f2fe]">LB PUSH TESTER</h1>
            <p className="text-xs text-[#718096] mt-1">OneSignal</p>
          </div>

          <div className="bg-[#15191d] rounded-2xl p-4 mb-6 text-sm text-center font-mono text-[#94a3b8] border border-[#101417]">
            {status}
          </div>

          <div className="space-y-3 mb-6">
            <div>
              <label className="text-xs text-[#718096] block mb-1">Titre</label>
              <input
                type="text"
                value={title}
                onChange={(e) => setTitle(e.target.value)}
                className="w-full bg-[#15191d] border border-[#242c33] rounded-xl px-4 py-2 text-sm text-[#e2e8f0] focus:outline-none focus:border-[#00f2fe]"
              />
            </div>
            <div>
              <label className="text-xs text-[#718096] block mb-1">Message</label>
              <input
                type="text"
                value={message}
                onChange={(e) => setMessage(e.target.value)}
                className="w-full bg-[#15191d] border border-[#242c33] rounded-xl px-4 py-2 text-sm text-[#e2e8f0] focus:outline-none focus:border-[#00f2fe]"
              />
            </div>
          </div>

          <div className="flex flex-col gap-3 mb-6">
            {!isSubscribed ? (
              <button
                onClick={handleSubscribe}
                disabled={loading}
                className="w-full py-3 rounded-xl font-semibold bg-gradient-to-r from-[#00c6ff] to-[#00f2fe] text-[#0f172a] transition-transform active:scale-95"
              >
                {loading ? 'Chargement...' : "S'abonner OneSignal"}
              </button>
            ) : (
              <>
                <button
                  onClick={handleSend}
                  disabled={loading}
                  className="w-full py-3 rounded-xl font-semibold bg-[#222a30] text-[#00f2fe] border border-[#2b353d] transition-transform active:scale-95"
                >
                  {loading ? 'Envoi...' : '📤 Envoyer'}
                </button>
                <button
                  onClick={handleUnsubscribe}
                  disabled={loading}
                  className="w-full py-3 rounded-xl font-semibold bg-[#2a1a1a] text-[#fc8181] border border-[#4a2b2b] transition-transform active:scale-95"
                >
                  Se désabonner
                </button>
              </>
            )}
            <button
              onClick={handleLocalTest}
              disabled={loading}
              className="w-full py-3 rounded-xl font-semibold bg-[#1a2a2f] text-[#81e6d9] border border-[#2b4a4d] transition-transform active:scale-95"
            >
              {loading ? 'Test...' : '🧪 Test local (SW)'}
            </button>
          </div>

          <div className="mt-4">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-semibold text-[#718096] uppercase tracking-wider">
                Console de débogage
              </span>
              <div className="flex gap-2">
                <button onClick={clearLogs} className="text-xs text-[#718096] hover:text-[#94a3b8] transition">Effacer</button>
                <button onClick={copyLogs} className="text-xs text-[#00f2fe] hover:text-[#00c6ff] transition">📋 Copier le rapport</button>
              </div>
            </div>
            <div className="bg-[#0d1114] rounded-xl border border-[#1f282f] p-3 h-48 overflow-y-auto font-mono text-xs leading-relaxed">
              {logs.length === 0 ? (
                <div className="text-[#4a5568] italic">Aucun log</div>
              ) : (
                logs.map((log, idx) => (
                  <div key={idx} className={log.error ? 'text-[#fc8181]' : 'text-[#a0aec0]'}>
                    <span className="text-[#4a5568]">[{log.time}]</span> {log.msg}
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

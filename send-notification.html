<!DOCTYPE html>
<html>
<head>
  <title>Envoi de notification</title>
</head>
<body>
  <h1>📱 Envoyer une notification push</h1>
  <input id="title" placeholder="Titre" value="Test rapide" />
  <br>
  <textarea id="body" placeholder="Message">Ceci est un test direct</textarea>
  <br>
  <button onclick="send()">📤 Envoyer</button>
  <pre id="result"></pre>

  <script>
    const APP_ID = '893ad5cf-804c-4e1c-a564-b5f3afbe3c75';
    const API_KEY = 'os_v2_app_re5nlt4ajrhbzjlewxz27pr4ow6wg4tmq26uc7mhj35vzio3xkmm3w46jbb4b46lt6nenef7n5fnpsw5fkgkvdw42b5mrjj4xpztudy';

    async function send() {
      const title = document.getElementById('title').value;
      const body = document.getElementById('body').value;
      const result = document.getElementById('result');

      result.textContent = '⏳ Envoi en cours...';

      try {
        const res = await fetch('https://onesignal.com/api/v1/notifications', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Basic ' + API_KEY
          },
          body: JSON.stringify({
            app_id: APP_ID,
            contents: { en: body },
            headings: { en: title },
            included_segments: ['All'],
            url: 'https://mekeirish.github.io/Webpush/'
          })
        });

        const data = await res.json();
        if (res.ok) {
          result.textContent = '✅ Envoyé ! ID: ' + data.id;
        } else {
          result.textContent = '❌ Erreur: ' + JSON.stringify(data, null, 2);
        }
      } catch (err) {
        result.textContent = '❌ Échec: ' + err.message;
      }
    }
  </script>
</body>
</html>
